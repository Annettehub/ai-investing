# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
# Quartz 5 配置 —— 由 v4.5.2 的 quartz.config.ts + quartz.layout.ts 迁移而来
# 迁移说明：
#   - 配置格式由 TypeScript 改为 YAML（v4 的 quartz.config.ts / quartz.layout.ts 已废弃）
#   - 插件改为 git 插件（github:quartz-community/*），由 `npx quartz plugin install` 装入 .quartz/plugins/
#   - v4 的 FrontMatter() 由 note-properties 接管；ComponentResources/Assets/Static 在 v5 内置（已移除）
#   - NotFoundPage() 由内置 404 pageType 布局接管
#   - analytics provider 由字符串 "null" 修正为 YAML null
#   - defaultDateType 由 configuration 移到 created-modified-date 插件的 options
# ✅ 第4步已解决：v5 explorer 支持 mapFn（构建期 .toString() 序列化、客户端 new Function 重建）。
#    在 YAML 中以字符串 block scalar 提供即可生效，无需自写插件。节点形状变更：
#    v4 的 node.slug → v5 的 node.slugSegments.join("/")；node.slugSegment 仍是末段。

configuration:
  pageTitle: AI投研知识库
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: zh-CN
  baseUrl: annettehub.github.io/ai-investing
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - scripts
    - processed
    - tools
    - config
    - node_modules
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Noto Sans SC
      body: Noto Sans SC
      code: Fira Code
    colors:
      lightMode:
        light: "#faf8f8"
        lightgray: "#e5e5e5"
        gray: "#b8b8b8"
        darkgray: "#4e4e4e"
        dark: "#2b2b2b"
        secondary: "#284b63"
        tertiary: "#84a59d"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#fff23688"
      darkMode:
        light: "#161618"
        lightgray: "#393639"
        gray: "#646464"
        darkgray: "#d4d4d4"
        dark: "#ebebec"
        secondary: "#7b97aa"
        tertiary: "#84a59d"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#b3aa0288"

plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: created
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
      display: desktop-only
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  # 无自定义域名（用的是 GitHub Pages 项目页 annettehub.github.io/ai-investing），关闭 CNAME 写入
  - source: github:quartz-community/cname
    enabled: false
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
    options:
      # 迁移自 v4 的 explorerWithShortHypothesisNames：让 02-kb/hypotheses/H*.md 在左侧导航显示短名。
      # v5 以字符串形式提供函数，构建期序列化、客户端 new Function 重建。
      # 节点形状变更：node.slug(字符串) → node.slugSegments(数组).join("/")；node.slugSegment 仍是末段。
      mapFn: |
        (node) => {
          if (
            !node.isFolder &&
            (node.slugSegments || []).join("/").startsWith("02-kb/hypotheses/") &&
            /^H\d/.test(node.slugSegment || "")
          ) {
            node.displayName = node.slugSegment
          }
        }
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  # - source: github:quartz-community/article-title
  #   enabled: true
  #   layout:
  #     position: beforeBody
  #     priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  # v4 中启用（TagList 组件），v5 默认关闭，这里显式开启
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/Annettehub/ai-investing
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
    order: 900
    layout:
      position: body
      priority: 100
      display: all
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all

layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
