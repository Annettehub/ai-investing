name: Sync Feishu Docs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install feishu2md
        run: |
          curl -sL https://github.com/Wsine/feishu2md/releases/latest/download/feishu2md-linux-amd64 -o feishu2md
          chmod +x feishu2md
          ./feishu2md --version

      - name: Export Feishu folder
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          ./feishu2md config --appId $FEISHU_APP_ID --appSecret $FEISHU_APP_SECRET
          ./feishu2md dl --batch -o 03-raw/feishu/ "https://open.feishu.cn/drive/folder/${{ secrets.FEISHU_FOLDER_TOKEN }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add 03-raw/
          git diff --cached --quiet || (git commit -m "Sync feishu docs: $(date +%Y-%m-%d-%H:%M)" && git push)
