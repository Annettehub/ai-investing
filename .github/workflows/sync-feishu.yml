name: Sync Feishu to 03-raw

on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟
  workflow_dispatch:  # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: python scripts/sync_feishu.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add 03-raw/
          git diff --cached --quiet || (git commit -m "Auto-sync from Feishu: $(date +%Y-%m-%d-%H:%M)" && git push)
