name: Sync SEC Earnings Data

on:
  workflow_dispatch:
  schedule:
    - cron: '45 11 * * 1-5'
    - cron: '45 22 * * 1-5'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync SEC filings and facts
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: python scripts/sync_sec_earnings.py --days 45

      - name: Commit changed SEC data
        run: |
          if git diff --quiet -- 03-raw/sec 04-output/data/us-equity-earnings-dashboard.json 04-output/data/R1-upstream-dashboard.json 04-output/data/R2-downstream-dashboard.json 05-meta/sec-earnings-state.json; then
            echo "No SEC earnings changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 03-raw/sec 04-output/data/us-equity-earnings-dashboard.json 04-output/data/R1-upstream-dashboard.json 04-output/data/R2-downstream-dashboard.json 05-meta/sec-earnings-state.json
          git commit -m "data: sync SEC earnings feed"
          git push
